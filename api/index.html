<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Cinema</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
a { color: inherit; text-decoration: none; }

header { position: sticky; top: 0; z-index: 100; background: rgba(13,17,23,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #21262d; padding: 12px 16px; display: flex; gap: 12px; align-items: center; }
.logo { font-size: 20px; font-weight: 800; color: #ff8a00; cursor: pointer; white-space: nowrap; }
.search { flex: 1; display: flex; gap: 6px; }
.search input { flex: 1; background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 9px 12px; border-radius: 8px; font-size: 14px; outline: none; }
.search input:focus { border-color: #ff8a00; }
.search button { background: #ff8a00; color: #0d1117; border: none; padding: 0 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }

.tabs { display: flex; gap: 4px; padding: 10px 16px; overflow-x: auto; background: #0d1117; border-bottom: 1px solid #21262d; }
.tabs button { background: #161b22; color: #e6edf3; border: 1px solid #30363d; padding: 7px 14px; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; }
.tabs button.active { background: #ff8a00; color: #0d1117; border-color: #ff8a00; font-weight: 600; }

main { padding: 16px; max-width: 1400px; margin: 0 auto; }
h2 { margin: 8px 0 14px; font-size: 18px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
.card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
.card:hover { transform: translateY(-3px); border-color: #ff8a00; }
.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #0d1117; }
.card-body { padding: 8px 10px; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { font-size: 11px; color: #8b949e; margin-top: 4px; display: flex; justify-content: space-between; }
.rating { color: #ff8a00; font-weight: 600; }

.detail { padding: 0; }
.detail-hero { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.detail-hero img { width: 220px; max-width: 100%; border-radius: 10px; }
.detail-info { flex: 1; min-width: 240px; }
.detail-info h1 { font-size: 24px; margin-bottom: 8px; }
.detail-info .meta { color: #8b949e; margin: 6px 0; font-size: 14px; }
.detail-info p { line-height: 1.5; margin: 10px 0; }

.player-section { background: #161b22; border-radius: 10px; padding: 16px; margin-top: 16px; border: 1px solid #21262d; }
.player-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.player-controls select, .player-controls button { background: #0d1117; color: #e6edf3; border: 1px solid #30363d; padding: 9px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.player-controls button { background: #ff8a00; color: #0d1117; border-color: #ff8a00; font-weight: 600; }
#video { width: 100%; max-height: 70vh; background: #000; border-radius: 8px; }

.loader { text-align: center; padding: 40px; color: #8b949e; }
.error { text-align: center; padding: 20px; color: #f85149; background: #21262d; border-radius: 8px; margin: 16px 0; }
.back-btn { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 12px; }
.back-btn:hover { background: #30363d; }

@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .card-title { font-size: 12px; }
  .detail-hero img { width: 160px; }
  .logo { font-size: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">🎬 CINEMA</div>
  <form class="search" onsubmit="event.preventDefault(); doSearch();">
    <input type="text" id="searchInput" placeholder="Поиск фильмов и сериалов...">
    <button type="submit">🔍</button>
  </form>
</header>

<div class="tabs" id="tabs">
  <button class="active" data-cat="TOP_POPULAR_ALL">🔥 Популярное</button>
  <button data-cat="TOP_250_MOVIES">🏆 Топ-250 фильмов</button>
  <button data-cat="TOP_250_TV_SHOWS">📺 Топ-250 сериалов</button>
  <button data-cat="POPULAR_SERIES">📡 Сериалы</button>
  <button data-cat="VAMPIRE_THEME">🧛 Вампиры</button>
  <button data-cat="COMICS_THEME">💥 Комиксы</button>
  <button data-cat="FAMILY">👨‍👩‍👧 Семейные</button>
  <button data-cat="OSKAR_WINNERS_2021">🏅 Оскар</button>
</div>

<main id="main">
  <div class="loader">Загрузка...</div>
</main>

<script>
const KP_KEY = '874e0326-bfe3-4d69-ab13-99b243d49a7a';
const KP_API = 'https://kinopoiskapiunofficial.tech';
const REZKA_PROXY = '/api/rezka';

const main = document.getElementById('main');
const tabs = document.getElementById('tabs');
let currentCategory = 'TOP_POPULAR_ALL';

async function kpFetch(path) {
  const r = await fetch(KP_API + path, { headers: { 'X-API-KEY': KP_KEY, 'Accept': 'application/json' } });
  if (!r.ok) throw new Error('KP API ' + r.status);
  return r.json();
}

async function getCollection(type, page = 1) {
  return kpFetch(`/api/v2.2/films/collections?type=${type}&page=${page}`);
}

async function searchKP(query) {
  return kpFetch(`/api/v2.1/films/search-by-keyword?keyword=${encodeURIComponent(query)}&page=1`);
}

async function getFilm(id) {
  return kpFetch(`/api/v2.2/films/${id}`);
}

function renderCard(item) {
  const id = item.kinopoiskId || item.filmId || item.id;
  const title = item.nameRu || item.nameEn || item.nameOriginal || 'Без названия';
  const poster = item.posterUrlPreview || item.posterUrl || '';
  const year = item.year || (item.releaseYears && item.releaseYears[0] ? item.releaseYears[0].start : '');
  const rating = item.rating || item.ratingKinopoisk || item.ratingImdb || '';
  return `
    <div class="card" onclick="showDetail(${id})">
      <img src="${poster}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 150%22%3E%3Crect fill=%22%23161b22%22 width=%22100%22 height=%22150%22/%3E%3Ctext x=%2250%22 y=%2275%22 text-anchor=%22middle%22 fill=%22%238b949e%22 font-size=%2210%22%3ENo image%3C/text%3E%3C/svg%3E'">
      <div class="card-body">
        <div class="card-title">${title}</div>
        <div class="card-meta"><span>${year || ''}</span>${rating ? `<span class="rating">★ ${rating}</span>` : ''}</div>
      </div>
    </div>`;
}

function renderGrid(items, title) {
  if (!items || !items.length) { main.innerHTML = '<div class="error">Ничего не найдено</div>'; return; }
  main.innerHTML = `<h2>${title}</h2><div class="grid">${items.map(renderCard).join('')}</div>`;
}

async function loadCategory(cat) {
  currentCategory = cat;
  [...tabs.children].forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  main.innerHTML = '<div class="loader">Загрузка...</div>';
  try {
    const data = await getCollection(cat);
    const items = data.items || data.films || [];
    const titleMap = {
      TOP_POPULAR_ALL: 'Популярное',
      TOP_250_MOVIES: 'Топ-250 фильмов',
      TOP_250_TV_SHOWS: 'Топ-250 сериалов',
      POPULAR_SERIES: 'Популярные сериалы',
      VAMPIRE_THEME: 'Вампиры',
      COMICS_THEME: 'Комиксы',
      FAMILY: 'Семейные',
      OSKAR_WINNERS_2021: 'Оскар 2021'
    };
    renderGrid(items, titleMap[cat] || cat);
  } catch (e) {
    main.innerHTML = `<div class="error">Ошибка загрузки: ${e.message}</div>`;
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  main.innerHTML = '<div class="loader">Поиск...</div>';
  try {
    const data = await searchKP(q);
    renderGrid(data.films || [], `Результаты: «${q}»`);
  } catch (e) {
    main.innerHTML = `<div class="error">Ошибка поиска: ${e.message}</div>`;
  }
}

function goHome() {
  document.getElementById('searchInput').value = '';
  loadCategory(currentCategory);
}

async function showDetail(kpId) {
  main.innerHTML = '<div class="loader">Загрузка фильма...</div>';
  try {
    const film = await getFilm(kpId);
    const title = film.nameRu || film.nameOriginal;
    const origTitle = film.nameOriginal && film.nameOriginal !== title ? film.nameOriginal : '';
    const year = film.year || '';
    const rating = film.ratingKinopoisk || film.ratingImdb || '';
    const desc = film.description || film.shortDescription || 'Описание отсутствует.';
    const genres = (film.genres || []).map(g => g.genre).join(', ');
    const countries = (film.countries || []).map(c => c.country).join(', ');
    const length = film.filmLength ? `${film.filmLength} мин.` : '';

    main.innerHTML = `
      <button class="back-btn" onclick="goHome()">← Назад</button>
      <div class="detail">
        <div class="detail-hero">
          <img src="${film.posterUrl || film.posterUrlPreview || ''}" alt="">
          <div class="detail-info">
            <h1>${title}${year ? ` (${year})` : ''}</h1>
            ${origTitle ? `<div class="meta">${origTitle}</div>` : ''}
            ${rating ? `<div class="meta"><span class="rating">★ ${rating}</span></div>` : ''}
            ${genres ? `<div class="meta">Жанр: ${genres}</div>` : ''}
            ${countries ? `<div class="meta">Страна: ${countries}</div>` : ''}
            ${length ? `<div class="meta">Длительность: ${length}</div>` : ''}
            <p>${desc}</p>
          </div>
        </div>
        <div class="player-section" id="playerSection">
          <h2>▶️ Смотреть онлайн</h2>
          <div class="loader" id="playerLoader">Ищем на HDRezka...</div>
        </div>
      </div>`;
    
    loadRezkaPlayer(title, origTitle, year, film.type === 'TV_SERIES' || film.serial);
  } catch (e) {
    main.innerHTML = `<div class="error">Ошибка: ${e.message}</div><button class="back-btn" onclick="goHome()">← Назад</button>`;
  }
}

async function rezkaSearch(query) {
  const path = `/search/?do=search&subaction=search&q=${encodeURIComponent(query)}`;
  const r = await fetch(`${REZKA_PROXY}?path=${encodeURIComponent(path)}`);
  if (!r.ok) throw new Error('Rezka search failed');
  return r.text();
}

async function rezkaGetPage(url) {
  const u = new URL(url);
  const r = await fetch(`${REZKA_PROXY}?path=${encodeURIComponent(u.pathname)}`);
  if (!r.ok) throw new Error('Rezka page failed');
  return r.text();
}

function parseSearchResults(html) {
  const results = [];
  const itemRe = /<div class="b-content__inline_item"[^>]*data-id="(\d+)"[^>]*data-url="([^"]+)"[\s\S]*?<div class="b-content__inline_item-link">\s*<a[^>]*>([^<]+)<\/a>\s*<div>([^<]*)<\/div>/g;
  let m;
  while ((m = itemRe.exec(html)) !== null) {
    results.push({ id: m[1], url: m[2], title: m[3].trim(), meta: m[4].trim() });
  }
  return results;
}

function parseFilmPage(html) {
  const idMatch = html.match(/initCDNMoviesEvents\((\d+),\s*(\d+)/) || html.match(/initCDNSeriesEvents\((\d+),\s*(\d+)/);
  if (!idMatch) return null;
  const filmId = idMatch[1];
  const defaultTranslator = idMatch[2];
  const isSeries = /initCDNSeriesEvents/.test(html);

  const translators = [];
  const trRe = /<li[^>]*data-translator_id="(\d+)"[^>]*>[\s\S]*?<a[^>]*>([^<]+)<\/a>/g;
  let m;
  while ((m = trRe.exec(html)) !== null) {
    translators.push({ id: m[1], name: m[2].trim() });
  }
  if (!translators.length) {
    translators.push({ id: defaultTranslator, name: 'Оригинал' });
  }
  return { filmId, defaultTranslator, translators, isSeries };
}

function decodeRezkaUrl(encoded) {
  const trash = ['//_//', '////_/', '//\\_/'];
  let s = encoded;
  if (s.startsWith('#h')) s = s.slice(2);
  let changed = true;
  while (changed) {
    changed = false;
    for (const t of trash) {
      const b64 = btoa(t);
      while (s.includes(b64)) { s = s.replace(b64, ''); changed = true; }
    }
  }
  try {
    return atob(s);
  } catch (e) {
    return encoded;
  }
}

function parseQualityList(decodedStr) {
  const qualities = [];
  const re = /\[(\d+p[^\]]*)\]([^,\s]+\.(?:mp4|m3u8)[^,\s]*)/g;
  let m;
  while ((m = re.exec(decodedStr)) !== null) {
    qualities.push({ quality: m[1], url: m[2] });
  }
  return qualities;
}

async function getStreamUrl(filmId, translatorId, isSeries, season, episode) {
  const body = new URLSearchParams();
  body.append('id', filmId);
  body.append('translator_id', translatorId);
  if (isSeries && season && episode) {
    body.append('season', season);
    body.append('episode', episode);
    body.append('action', 'get_stream');
  } else {
    body.append('action', 'get_movie');
  }
  const r = await fetch(`${REZKA_PROXY}?path=${encodeURIComponent('/ajax/get_cdn_series/?t=' + Date.now())}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  });
  if (!r.ok) throw new Error('Stream request failed: ' + r.status);
  const data = await r.json();
  if (!data.success || !data.url) throw new Error('No stream URL in response');
  const decoded = decodeRezkaUrl(data.url);
  return parseQualityList(decoded);
}

async function loadRezkaPlayer(title, origTitle, year, isSeries) {
  const section = document.getElementById('playerSection');
  const loader = document.getElementById('playerLoader');
  try {
    const queries = [
      `${title} ${year || ''}`.trim(),
      title,
      origTitle ? `${origTitle} ${year || ''}`.trim() : null,
      origTitle
    ].filter(Boolean);

    let found = null;
    for (const q of queries) {
      const html = await rezkaSearch(q);
      const results = parseSearchResults(html);
      if (results.length) {
        found = year ? (results.find(r => r.meta.includes(year)) || results[0]) : results[0];
        break;
      }
    }
    if (!found) throw new Error('Не найдено на HDRezka');

    loader.textContent = 'Загружаем страницу фильма...';
    const pageHtml = await rezkaGetPage(found.url);
    const info = parseFilmPage(pageHtml);
    if (!info) throw new Error('Не удалось распарсить страницу фильма');

    section.innerHTML = `
      <h2>▶️ ${found.title}</h2>
      <div class="player-controls">
        <select id="translatorSel">
          ${info.translators.map(t => `<option value="${t.id}" ${t.id === info.defaultTranslator ? 'selected' : ''}>${t.name}</option>`).join('')}
        </select>
        ${info.isSeries ? `
          <input id="seasonInp" type="number" min="1" value="1" placeholder="Сезон" style="width:80px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;padding:9px;border-radius:8px;">
          <input id="episodeInp" type="number" min="1" value="1" placeholder="Серия" style="width:80px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;padding:9px;border-radius:8px;">
        ` : ''}
        <select id="qualitySel"></select>
        <button onclick="playVideo()">▶️ Смотреть</button>
      </div>
      <video id="video" controls playsinline></video>
      <div id="playerMsg" style="margin-top:10px;color:#8b949e;font-size:13px;"></div>
    `;
    
    window._rezkaInfo = { ...info, sourceUrl: found.url };
    await playVideo();
  } catch (e) {
    section.innerHTML = `
      <h2>▶️ Смотреть онлайн</h2>
      <div class="error">${e.message}</div>
      <div style="color:#8b949e;font-size:13px;margin-top:8px;">Возможно, фильм ещё не появился на HDRezka или название не совпадает.</div>
    `;
  }
}

async function playVideo() {
  const info = window._rezkaInfo;
  if (!info) return;
  const msg = document.getElementById('playerMsg');
  const video = document.getElementById('video');
  const qSel = document.getElementById('qualitySel');
  const tSel = document.getElementById('translatorSel');
  const sInp = document.getElementById('seasonInp');
  const eInp = document.getElementById('episodeInp');
  
  msg.textContent = 'Получаем ссылку на видео...';
  try {
    const qualities = await getStreamUrl(
      info.filmId,
      tSel.value,
      info.isSeries,
      sInp ? sInp.value : null,
      eInp ? eInp.value : null
    );
    if (!qualities.length) throw new Error('Не удалось получить видео-поток');
    
    qSel.innerHTML = qualities.map((q, i) => `<option value="${i}">${q.quality}</option>`).join('');
    qSel.onchange = () => { video.src = qualities[qSel.value].url; video.play(); };
    
    const bestIdx = qualities.length - 1;
    qSel.value = bestIdx;
    video.src = qualities[bestIdx].url;
    video.play().catch(() => {});
    msg.textContent = `Озвучка: ${tSel.options[tSel.selectedIndex].text} · Качество: ${qualities[bestIdx].quality}`;
  } catch (e) {
    msg.innerHTML = `<span style="color:#f85149;">Ошибка плеера: ${e.message}</span>`;
  }
}

tabs.addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') loadCategory(e.target.dataset.cat);
});

loadCategory('TOP_POPULAR_ALL');
</script>
</body>
</html>
